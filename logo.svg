<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260">

  <!-- ╔════════════════════════════════════════════════════════════════╗
       ║  semeion — σημεῖον: il segno-punto.                             ║
       ║  L'occhio dell'àugure legge il campo dei segni grezzi; la forma ║
       ║  fedele NON si stipula, EMERGE: l'iride è un arco (gauge) con   ║
       ║  la lancetta forzata sul valore dell'SLI, dentro [0,1].         ║
       ╚════════════════════════════════════════════════════════════════╝ -->

  <!-- ── IL CAMPO DEI SEGNI: raggi grezzi attorno all'occhio ────────── -->
  <g stroke="#3A6EA5" stroke-width="2.2" stroke-linecap="round" opacity="0.45">
    <line x1="100" y1="54"   x2="100" y2="44"/>
    <line x1="145.2" y1="72.8" x2="152.3" y2="65.7"/>
    <line x1="164" y1="118"  x2="174" y2="118"/>
    <line x1="145.2" y1="163.2" x2="152.3" y2="170.3"/>
    <line x1="100" y1="182"  x2="100" y2="192"/>
    <line x1="54.8" y1="163.2" x2="47.7" y2="170.3"/>
    <line x1="36"  y1="118"  x2="26"  y2="118"/>
    <line x1="54.8" y1="72.8" x2="47.7" y2="65.7"/>
  </g>

  <!-- ── L'IRIDE: il bordo del segno ────────────────────────────────── -->
  <circle cx="100" cy="118" r="58" fill="none" stroke="#1B3A5B" stroke-width="3"/>
  <circle cx="100" cy="118" r="58" fill="#1B3A5B" opacity="0.05"/>

  <!-- ── L'ARCO (gauge): la forma forzata dai bounds [0,1] ──────────── -->
  <!-- track completo 0→1 (faint): il dominio bounded -->
  <path d="M 54 118 A 46 46 0 0 1 146 118"
        fill="none" stroke="#2C4A6B" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <!-- riempimento 0→0.8: l'SLI raggiunto (la lettura viva) -->
  <path d="M 54 118 A 46 46 0 0 1 137.2 91"
        fill="none" stroke="#2DB9A8" stroke-width="6" stroke-linecap="round"/>

  <!-- estremi del dominio: 0 e 1 (il bound è il TEOREMA, non una config) -->
  <text x="49" y="133" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="9" font-weight="bold" fill="#1B3A5B">0</text>
  <text x="151" y="133" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="9" font-weight="bold" fill="#1B3A5B">1</text>

  <!-- ── LA LANCETTA: forzata sul valore — non scelta ──────────────── -->
  <line x1="100" y1="118" x2="132.4" y2="94.5"
        stroke="#E0A030" stroke-width="3" stroke-linecap="round"/>

  <!-- ── LA PUPILLA: il σημεῖον — «ciò che non ha parte» (Eucl. Def. 1) -->
  <circle cx="100" cy="118" r="9.5" fill="#15293F"/>
  <circle cx="100" cy="118" r="9.5" fill="none" stroke="#E0A030" stroke-width="2"/>
  <circle cx="100" cy="118" r="2.4" fill="#EAF6FB"/>

  <!-- ── SIMBOLI: σ (il segno) · ⊢ (forzato, provato) ──────────────── -->
  <text x="100" y="36" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="20" font-weight="bold" fill="#1B3A5B">σ</text>
  <text x="158" y="88" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="15" font-weight="bold" fill="#2DB9A8">⊢</text>

  <!-- ── NOME ───────────────────────────────────────────────────────── -->
  <text x="100" y="232" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" font-weight="bold" letter-spacing="5" fill="#1B3A5B">SEMEION</text>
  <text x="100" y="248" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="7.5" letter-spacing="1" fill="#3A6EA5">σημεῖον · il segno-punto</text>
</svg>
